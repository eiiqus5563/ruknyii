name: rukny-dev

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-rukny_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-rukny_io}
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - rukny_dev_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rukny_admin} -d ${DB_NAME:-rukny_io}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - rukny_dev_network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${REDIS_PASSWORD}' ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: always
    command:
      - sh
      - -c
      - >-
        node -e "const net=require('net'); const retry=()=>{const socket=net.createConnection({host:'postgres',port:5432},()=>{socket.end(); process.exit(0);}); socket.on('error',()=>setTimeout(retry,1000));}; retry();"
        && npx prisma db push --accept-data-loss --config prisma/prisma.config.ts
        && node dist/main
    env_file:
      - ./.env
      - ./.env.rukny-dev
    ports:
      - "0.0.0.0:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-rukny_admin}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-rukny_io}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      FRONTEND_URL: http://localhost:3000
      FRONTEND_URL_ALT: http://localhost:3000
      APP_FRONTEND_URL: http://localhost:3000
      AUTH_FRONTEND_URL: http://localhost:3000
      AUTH_BASE_URL: http://localhost:3001
      COOKIE_DOMAIN: ""
      COOKIE_SECURE: false
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/v1/auth/google/callback
      LINKEDIN_CALLBACK_URL: http://localhost:3001/api/v1/auth/linkedin/callback
      LINKEDIN_INTEGRATION_CALLBACK_URL: http://localhost:3001/api/v1/integrations/linkedin/callback
      INSTAGRAM_REDIRECT_URI: http://localhost:3001/api/v1/integrations/instagram/callback
      YOUTUBE_REDIRECT_URI: http://localhost:3001/api/v1/integrations/youtube/callback
      GOOGLE_SHEETS_REDIRECT_URI: http://localhost:3001/api/v1/integrations/google-sheets/callback
      QASEH_REDIRECT_URL: http://localhost:3000/payment/callback
      QASEH_WEBHOOK_URL: http://localhost:3001/payments/qaseh/webhook
    networks:
      - rukny_dev_network

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        API_BACKEND_URL: http://api:3001
        NEXT_PUBLIC_API_EXTERNAL_URL: http://localhost:3001/api/v1
        NEXT_PUBLIC_APP_URL: http://localhost:3000
        NEXT_PUBLIC_ROOT_DOMAIN: ""
    restart: always
    env_file:
      - ./.env
      - ./.env.rukny-dev
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_BACKEND_URL: http://api:3001
      API_URL: http://api:3001
      NEXT_PUBLIC_API_EXTERNAL_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_ROOT_DOMAIN: ""
    networks:
      - rukny_dev_network

  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        API_BACKEND_URL: http://api:3001
    restart: always
    ports:
      - "127.0.0.1:3002:3002"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_BACKEND_URL: http://api:3001
      API_URL: http://api:3001
    networks:
      - rukny_dev_network

  business:
    build:
      context: ./apps/business
      dockerfile: Dockerfile
      args:
        API_BACKEND_URL: http://api:3001
    restart: always
    ports:
      - "127.0.0.1:3003:3003"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_BACKEND_URL: http://api:3001
      API_URL: http://api:3001
    networks:
      - rukny_dev_network

  developers:
    build:
      context: ./apps/developers
      dockerfile: Dockerfile
      args:
        API_BACKEND_URL: http://api:3001
    restart: always
    ports:
      - "127.0.0.1:3004:3004"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_BACKEND_URL: http://api:3001
      API_URL: http://api:3001
    networks:
      - rukny_dev_network

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@rukny.io}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_WTF_CSRF_SSL_STRICT: "False"
      SCRIPT_NAME: ""
    ports:
      - "127.0.0.1:5051:5050"
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rukny_dev_network

networks:
  rukny_dev_network:
    driver: bridge

volumes:
  postgres_dev_data:
  redis_dev_data:
  pgadmin_dev_data: