# ============================================
# PRODUCTION Docker Compose
# Deploy on DigitalOcean VPS
# ============================================

services:
  # ─── PostgreSQL Database ───
  postgres:
    image: postgres:16-alpine
    container_name: rukny_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-rukny_admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-rukny_io}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rukny_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-rukny_admin} -d ${DB_NAME:-rukny_io}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis Cache ───
  redis:
    image: redis:7-alpine
    container_name: rukny_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - rukny_network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── NestJS API ───
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rukny_api
    restart: always
    ports:
      - "0.0.0.0:3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://${DB_USER:-rukny_admin}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-rukny_io}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-7d}
      TWO_FACTOR_ENCRYPTION_KEY: ${TWO_FACTOR_ENCRYPTION_KEY}
      INTERNAL_API_SECRET: ${INTERNAL_API_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      FRONTEND_URL_ALT: ${FRONTEND_URL_ALT:-http://localhost:3000}
      APP_FRONTEND_URL: ${APP_FRONTEND_URL:-http://localhost:3000}
      AUTH_FRONTEND_URL: ${AUTH_FRONTEND_URL:-http://localhost:3000}
      AUTH_BASE_URL: ${AUTH_BASE_URL:-http://localhost:3001}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      # OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL:-http://localhost:3001/api/v1/auth/google/callback}
      LINKEDIN_CLIENT_ID: ${LINKEDIN_CLIENT_ID}
      LINKEDIN_CLIENT_SECRET: ${LINKEDIN_CLIENT_SECRET}
      LINKEDIN_CALLBACK_URL: ${LINKEDIN_CALLBACK_URL:-http://localhost:3001/api/v1/auth/linkedin/callback}
      LINKEDIN_INTEGRATION_CALLBACK_URL: ${LINKEDIN_INTEGRATION_CALLBACK_URL:-http://localhost:3001/api/v1/integrations/linkedin/callback}
      LINKEDIN_SCOPES: ${LINKEDIN_SCOPES:-openid,profile,email}

      # Email
      RESEND_API_KEY: ${RESEND_API_KEY}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-notifications@rukny.work}
      # AWS
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET}
      # Instagram Integration
      INSTAGRAM_APP_ID: ${INSTAGRAM_APP_ID}
      INSTAGRAM_APP_SECRET: ${INSTAGRAM_APP_SECRET}
      INSTAGRAM_REDIRECT_URI: ${INSTAGRAM_REDIRECT_URI:-http://localhost:3001/api/v1/integrations/instagram/callback}
      # YouTube Integration
      YOUTUBE_CLIENT_ID: ${YOUTUBE_CLIENT_ID}
      YOUTUBE_CLIENT_SECRET: ${YOUTUBE_CLIENT_SECRET}
      YOUTUBE_REDIRECT_URI: ${YOUTUBE_REDIRECT_URI:-http://localhost:3001/api/v1/integrations/youtube/callback}
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY}
      # Google Sheets / Calendar Integration (reuses Google OAuth credentials)
      GOOGLE_CALENDAR_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CALENDAR_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_SHEETS_REDIRECT_URI: ${GOOGLE_SHEETS_REDIRECT_URI:-http://localhost:3001/api/v1/integrations/google-sheets/callback}
      # WhatsApp Business API (Meta Cloud API)
      WHATSAPP_BUSINESS_TOKEN: ${WHATSAPP_BUSINESS_TOKEN}
      WHATSAPP_PHONE_NUMBER_ID: ${WHATSAPP_PHONE_NUMBER_ID}
      WHATSAPP_BUSINESS_ACCOUNT_ID: ${WHATSAPP_BUSINESS_ACCOUNT_ID}
      WHATSAPP_AUTH_TEMPLATE_NAME: ${WHATSAPP_AUTH_TEMPLATE_NAME:-auth_otp}
      WHATSAPP_VERIFY_TOKEN: ${WHATSAPP_VERIFY_TOKEN}
      # WhatsApp Personal API (TechnoPlus)
      WHATSAPP_API_URL: ${WHATSAPP_API_URL:-https://message.dashboard.technoplus.tech}
      WHATSAPP_SESSION_ID: ${WHATSAPP_SESSION_ID}
      WHATSAPP_ACCESS_TOKEN: ${WHATSAPP_ACCESS_TOKEN}
      # Push Notifications
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT:-mailto:notifications@rukny.work}
    networks:
      - rukny_network

  # ─── Next.js Web App ───
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - API_BACKEND_URL=http://api:3001
        - NEXT_PUBLIC_API_EXTERNAL_URL=${NEXT_PUBLIC_API_EXTERNAL_URL:-http://localhost:3001/api/v1}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        - NEXT_PUBLIC_ROOT_DOMAIN=${NEXT_PUBLIC_ROOT_DOMAIN:-localhost:3000}
    container_name: rukny_web
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - api
    environment:
      NODE_ENV: production
      API_BACKEND_URL: http://api:3001
      API_URL: http://api:3001
      NEXT_PUBLIC_API_EXTERNAL_URL: ${NEXT_PUBLIC_API_EXTERNAL_URL:-http://localhost:3001/api/v1}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_ROOT_DOMAIN: ${NEXT_PUBLIC_ROOT_DOMAIN:-localhost:3000}
    networks:
      - rukny_network

  # ─── Next.js Admin App ───
  admin:
    build:
      context: ./apps/admin
      dockerfile: Dockerfile
      args:
        - API_BACKEND_URL=http://api:3001
    container_name: rukny_admin
    restart: always
    ports:
      - "0.0.0.0:3002:3002"
    depends_on:
      - api
    environment:
      API_BACKEND_URL: http://api:3001
      API_URL: http://api:3001
    networks:
      - rukny_network

  # ─── pgAdmin Database Manager ───
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: rukny_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@rukny.io}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      PGADMIN_LISTEN_PORT: 5050
      PGADMIN_CONFIG_ENHANCED_COOKIE_PROTECTION: "False"
      PGADMIN_CONFIG_WTF_CSRF_SSL_STRICT: "False"
      SCRIPT_NAME: ""
    ports:
      - "127.0.0.1:5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rukny_network

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: nginx:alpine
    container_name: rukny_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - web
      - api
      - admin
    networks:
      - rukny_network

volumes:
  postgres_data:
  redis_data:
  pgadmin_data:

networks:
  rukny_network:
    driver: bridge
