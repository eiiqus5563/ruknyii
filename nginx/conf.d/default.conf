# ─── Upstream Definitions ───
upstream web_upstream {
    server web:3000;
}

upstream api_upstream {
    server api:3001;
}

upstream admin_upstream {
    server admin:3002;
}

upstream business_upstream {
    server business:3003;
}

upstream developers_upstream {
    server developers:3004;
}

upstream pgadmin_upstream {
    server pgadmin:5050;
}

# ─── SSL Settings ───
ssl_certificate     /etc/nginx/ssl/rukny.crt;
ssl_certificate_key /etc/nginx/ssl/rukny.key;
ssl_protocols       TLSv1.2 TLSv1.3;
ssl_ciphers         HIGH:!aNULL:!MD5;
ssl_session_cache   shared:SSL:10m;
ssl_session_timeout 10m;

# ─── HTTP → HTTPS Redirect (all domains) ───
server {
    listen 80;
    server_name rukny.io www.rukny.io app.rukny.io accounts.rukny.io
                api.rukny.io admin.rukny.io business.rukny.io
                developers.rukny.io db.rukny.io;
    return 301 https://$host$request_uri;
}

# ─── Web App: rukny.io + app/accounts subdomains ───
server {
    listen 443 ssl;
    server_name rukny.io www.rukny.io app.rukny.io accounts.rukny.io;

    location / {
        limit_req zone=web burst=20 nodelay;
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── API: api.rukny.io ───
server {
    listen 443 ssl;
    server_name api.rukny.io;

    # Upload endpoints need longer timeouts and larger body size
    location ~* /api/v1/(admin/wallpapers/upload|upload) {
        client_max_body_size 55M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        limit_req zone=api burst=10 nodelay;
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─── Admin: admin.rukny.io ───
server {
    listen 443 ssl;
    server_name admin.rukny.io;

    # Upload proxy for admin wallpapers
    location /api/v1/admin/wallpapers/upload {
        client_max_body_size 55M;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_pass http://admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        limit_req zone=web burst=20 nodelay;
        proxy_pass http://admin_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
    }
}

